name = "flashstream-worker"
main = "worker/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 DATABASE ────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "flashstream-db"
database_id   = "6da5875a-37c7-4c12-b1d3-6eeaf4ced61c"

# ── KV NAMESPACES (temporarily disabled) ──────────────────
# [[kv_namespaces]]
# binding = "CACHE"
# id      = "REPLACE_WITH_CACHE_KV_ID"

# [[kv_namespaces]]
# binding = "SESSIONS"
# id      = "REPLACE_WITH_SESSIONS_KV_ID"

# [[kv_namespaces]]
# binding = "RATE_LIMITS"
# id      = "REPLACE_WITH_RATE_LIMITS_KV_ID"

# [[kv_namespaces]]
# binding = "LEAVING_SOON_CACHE"
# id      = "REPLACE_WITH_LEAVING_SOON_KV_ID"

# ── STATIC ENVIRONMENT VARIABLES ──────────────────────────
[vars]
ENVIRONMENT          = "production"
ALLOWED_ORIGIN       = "https://flashstream.pages.dev"
ALLOWED_ORIGIN_DEV   = "http://localhost:3000"
CLIENT_HEADER_KEY    = "X-FlashStream-Client"
CLIENT_HEADER_VALUE  = "web"
JWT_EXPIRY_SECONDS   = "604800"
VERIFY_TOKEN_EXPIRY  = "86400"
RESET_TOKEN_EXPIRY   = "3600"
SESSION_COOKIE_NAME  = "fs_session"
B2B_RATE_LIMIT_DAY   = "1000"
HONEYPOT_TMDB_IDS    = "999999999,888888888,777777777"

# ── OBSERVABILITY ─────────────────────────────────────────
[observability]
enabled = true